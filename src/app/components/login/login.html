<div class="auth-page flex justify-center items-center min-h-screen">
  <div class="auth-card max-w-md w-full px-8 py-10 rounded-2xl shadow-xl">
    <div class="auth-header text-center mb-8">
      <h2 class="text-2xl font-semibold text-gray-800">Welcome Back!</h2>
      <p class="text-gray-500 mt-2 text-sm">
        Sign in to access your organic goodies.
      </p>
    </div>

    <form (ngSubmit)="submit()" class="auth-form flex flex-col gap-4">
      <div class="form-group flex flex-col gap-1">
        <label for="email" class="text-sm font-medium text-gray-700">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          placeholder="hello@natufresh.in"
          class="auth-input"
        />
      </div>

      <div class="form-group flex flex-col gap-1">
        <label for="password" class="text-sm font-medium text-gray-700">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          placeholder="••••••••"
          class="auth-input"
        />
      </div>

      <button
        type="submit"
        class="auth-submit-btn mt-4 py-3 rounded-lg font-semibold transition-colors duration-200"
      >
        Sign In
      </button>
    </form>

    <div class="auth-footer text-center mt-6 text-sm text-gray-600">
      Don't have an account?
      <a
        routerLink="/signup"
        class="toggle-mode-btn ml-1 font-semibold text-primary hover:text-primary-dark transition-colors duration-200"
      >
        Sign Up
      </a>
    </div>
  </div>
</div>
